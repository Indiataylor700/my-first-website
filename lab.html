  <!-- Task Two -->
  <div class="lab" style="margin: 36px;">
    
    <h1>My favorite types of Pizza</h1>
    <ol class="my-roman" id="pizza">
        <li>Supreme</li>
        <li>Pepperoni</li>
        <li>Mushroom</li>
        <li>Cheese</li>
        <li>Meat Lovers</li>
    </ol>

    <button onclick="pizzaList();">Click Here</button>
  </div>

  <script type="text/javascript">
    function pizzaList() {
        document.getElementById('pizza')
        .classList.toggle('my-roman');
    }

    function addThem() {
        let input1 = document.getElementById('num1').value;
        let input2 = document.getElementById('num2').value;
        let total = input1 + input2;
        let sumTotal = `Sum total: ${total}`;
        document.getElementById('total').innerHTML = sumTotal;
    }
  </script>

  <!-- Task Three -->
   <div class="lab">
    <form>
        <label>The values below will be added together</label><br>
        <input type="text" id="num1" name="num1">
        <input type="text" id="num2" name="num2">
        <p id="total"></p>
        <button type="button" onclick="addThem()">Sum</button>
    </form>
   </div>
